name: MarkDown4W
options:
  bundleIdPrefix: net.songha
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    # Apple Developer Team ID (from your signing certificate's OU field).
    DEVELOPMENT_TEAM: "RCVQDZ42VU"
    # Automatic signing: Xcode picks "Apple Development" for local builds and
    # creates an "Apple Distribution" cert + Mac App Store provisioning profile
    # automatically when you Archive for the App Store.
    CODE_SIGN_STYLE: Automatic
targets:
  MarkDown4W:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: MarkDown4W
        excludes:
          - "Renderer/**"
      - path: MarkDown4W/Renderer
        type: folder
    settings:
      base:
        INFOPLIST_FILE: MarkDown4W/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: net.songha.MarkDown4W
        PRODUCT_NAME: MarkDown4W
        ENABLE_HARDENED_RUNTIME: "YES"
        COMBINE_HIDPI_IMAGES: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: "NO"
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    entitlements:
      path: MarkDown4W/MarkDown4W.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-only: true
